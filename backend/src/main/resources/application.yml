spring:
  application:
    name: mediguide-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/mediguide_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:mediguide_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:mediguide_pass}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 120000 # 2 minutes
      max-lifetime: 240000 # 4 minutes


  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
    defer-datasource-initialization: true

  sql:
    init:
      mode: never
      data-locations: classpath:data.sql

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${APP_JWT_SECRET:${JWT_SECRET:mediguide-super-secret-key-256-bits-long-for-jwt-authentication-2024}}
    expiration: ${APP_JWT_EXPIRATION:${JWT_EXPIRATION:86400000}}       # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://frontend:80

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.mediguide: DEBUG
    org.springframework.security: WARN
