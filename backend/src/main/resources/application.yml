spring:
  application:
    name: mediguide-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mediguide_db
    username: mediguide_user
    password: mediguide_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: mediguide-super-secret-key-256-bits-long-for-jwt-authentication-2024
    expiration: 86400000       # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://frontend:80

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.mediguide: DEBUG
    org.springframework.security: WARN
