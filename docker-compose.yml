services:

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mediguide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mediguide_db
      POSTGRES_USER:     mediguide_user
      POSTGRES_PASSWORD: mediguide_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediguide_user -d mediguide_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediguide-network

   # ──────────────────────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediguide-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL:      ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET:             ${JWT_SECRET}
      APP_JWT_EXPIRATION:         ${JWT_EXPIRATION}
      APP_CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    networks:
      - mediguide-network

  # ──────────────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediguide-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mediguide-network

volumes:
  postgres_data:

networks:
  mediguide-network:
    driver: bridge
